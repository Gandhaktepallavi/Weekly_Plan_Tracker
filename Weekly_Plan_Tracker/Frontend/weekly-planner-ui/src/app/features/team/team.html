<div class="container">

  <button class="home-btn" routerLink="/dashboard">← Back to Dashboard</button>

  <h2>Manage Team Members</h2>

  <!-- Add Member -->
  <div class="input-row">
    <input type="text"
           placeholder="Type a name"
           [(ngModel)]="name"
           (keyup.enter)="addMember()">

    <button (click)="addMember()">
      Save This Person
    </button>
  </div>

  <!-- Active Members List -->
  <h3 *ngIf="activeMembers.length > 0">Active Team Members</h3>
  <div *ngFor="let member of activeMembers" class="member-card">

    <div>
      <strong>{{ member.name }}</strong>

      <span *ngIf="member.isLead" class="lead-badge">
        Lead
      </span>
    </div>

    <div class="actions">
      <button (click)="editName(member)">Edit Name</button>

      <button *ngIf="!member.isLead"
              (click)="makeLead(member)">
        Make Lead
      </button>

      <button class="warning"
              (click)="deactivate(member)">
        Deactivate
      </button>

      <button class="danger"
              (click)="deleteMember(member)">
        Delete
      </button>
    </div>

  </div>

  <!-- Inactive Members List -->
  <h3 *ngIf="inactiveMembers.length > 0">Inactive Team Members</h3>
  <div *ngFor="let member of inactiveMembers" class="member-card inactive">

    <div>
      <strong>{{ member.name }}</strong>

      <span *ngIf="member.isLead" class="lead-badge">
        Lead
      </span>
    </div>

    <div class="actions">
      <button (click)="editName(member)">Edit Name</button>

      <button (click)="activate(member)">
        Reactivate
      </button>

      <button class="danger"
              (click)="deleteMember(member)">
        Delete
      </button>
    </div>

  </div>

  <!-- Empty state -->
  <div *ngIf="members.length === 0" class="empty-state">
    <p>No team members yet. Add your first team member above.</p>
  </div>

  <!-- Toast -->
  <div *ngIf="showToast" class="toast">
    Team member added!
  </div>

</div>
