<div class="container">
  <button class="home-btn" routerLink="/home">? Home</button>

  <h2>Manage Team Members</h2>

  <div class="input-row">
    <input type="text" placeholder="Type a name" [(ngModel)]="name" />
    <button (click)="addMember()">Save This Person</button>
  </div>

  <div *ngFor="let member of activeMembers" class="member-card">
    <div>
      <strong>{{ member.name }}</strong>
      <span *ngIf="member.isTeamLead" class="lead-badge">Lead</span>
    </div>

    <div class="actions">
      <button (click)="editName(member)">Edit Name</button>

      <button *ngIf="!member.isTeamLead" (click)="makeLead(member)">
        Make Lead
      </button>

      <button class="danger" *ngIf="!member.isTeamLead" (click)="deactivate(member)">
        Deactivate
      </button>
    </div>
  </div>

  <div *ngIf="showToast" class="toast">
    <span>{{ toastMessage }}</span>
    <button class="toast-close" type="button" (click)="closeToast()">x</button>
  </div>
</div>
