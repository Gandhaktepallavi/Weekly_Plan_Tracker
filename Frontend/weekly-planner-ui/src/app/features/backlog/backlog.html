<div class="container">

  <button class="home-btn" routerLink="/home">← Home</button>

  <h2>Manage Backlog</h2>

  <!-- Add Button -->
  <button class="add-btn" (click)="toggleForm()">
    Add a New Backlog Item
  </button>

  <!-- Form -->
  <div *ngIf="showForm" class="form-card">
    <input type="text" placeholder="Title"
           [(ngModel)]="title">

    <select [(ngModel)]="category">
      <option>Client Focused</option>
      <option>Tech Debt</option>
      <option>R&D</option>
    </select>

    <input type="number" min="1"
           [(ngModel)]="estimatedHours">

    <button (click)="addItem()">Save</button>
  </div>

  <!-- Category Filters -->
  <div class="category-buttons">
    <button (click)="selectedCategory='All'"
            [class.active]="selectedCategory==='All'">All</button>

    <button (click)="selectedCategory='Client Focused'"
            class="client"
            [class.active]="selectedCategory==='Client Focused'">
      Client Focused
    </button>

    <button (click)="selectedCategory='Tech Debt'"
            class="tech"
            [class.active]="selectedCategory==='Tech Debt'">
      Tech Debt
    </button>

    <button (click)="selectedCategory='R&D'"
            class="rnd"
            [class.active]="selectedCategory==='R&D'">
      R&D
    </button>
  </div>

  <!-- Search & Available -->
  <div class="filters-row">
    <label>
      <input type="checkbox" [(ngModel)]="availableOnly">
      Available Only
    </label>

    <input type="text"
           placeholder="Search by title"
           [(ngModel)]="searchTerm">
  </div>

  <!-- List -->
  <div *ngIf="filteredItems.length === 0" class="empty">
    No backlog items match your filters.
  </div>

  <div *ngFor="let item of filteredItems" class="item-card">
    <div class="title-row">
      <strong>{{ item.title }}</strong>
      <span class="badge"
            [ngClass]="item.category.replace(' ','-')">
        {{ item.category }}
      </span>
    </div>

    <p>{{ item.estimatedHours }}h estimated</p>

    <button class="delete"
            (click)="deleteItem(item.id)">
      Delete
    </button>
  </div>

</div>
