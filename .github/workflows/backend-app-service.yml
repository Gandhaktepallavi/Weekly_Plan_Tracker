name: Deploy Backend to Azure App Service

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY_NAME: '' # Optional ACR, leave empty for direct deploy
  APP_SERVICE_NAME: 'your-weeklyplanner-api' # CHANGE THIS
  RESOURCE_GROUP: 'your-rg' # CHANGE THIS

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Docker build & push (optional ACR)
      if: env.REGISTRY_NAME != ''
      run: |
        docker build Backend/ -t ${{ env.REGISTRY_NAME }}.azurecr.io/backend:${{ github.sha }}
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/backend:${{ github.sha }}
    
    - name: Deploy to App Service
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.APP_SERVICE_NAME }}
        resource-group: ${{ env.RESOURCE_GROUP }}
        images: 'Backend/Dockerfile' # Direct from Dockerfile
