name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
      - dev
      - backend-setup
      - frontend-setup

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build Angular
        run: |
          cd Frontend/weekly-planner-ui
          npm install
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "Frontend/weekly-planner-ui"
          api_location: "Backend/src/WeeklyPlanner.Api"
          output_location: "dist/weekly-planner-ui"
